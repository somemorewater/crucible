# =============================================================================
# Crucible Backend — Docker Compose Configuration
# =============================================================================
#
# Services:
#   - app:      Rust/Axum HTTP backend (port 8080)
#   - postgres: PostgreSQL 16 database (port 5432)
#   - redis:    Redis 7 cache & job queue (port 6379)
#
# Usage:
#   Development:   docker compose up -d
#   Production:    docker compose --profile production up -d
#   Rebuild:       docker compose up -d --build
#   Logs:          docker compose logs -f app
#   Teardown:      docker compose down
#   Full cleanup:  docker compose down -v  (removes volumes)
#
# Environment variables are loaded from .env (see .env.example)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: crucible-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crucible}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crucible_secret}
      POSTGRES_DB: ${POSTGRES_DB:-crucible_db}
      # Performance tuning for development
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crucible} -d ${POSTGRES_DB:-crucible_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    networks:
      - crucible-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7 — Caching & Job Queues
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: crucible-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-crucible_redis_secret}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --save 300 100
      --loglevel notice
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-crucible_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    networks:
      - crucible-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Crucible Backend — Rust/Axum Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUST_VERSION: ${RUST_VERSION:-1.78}
    container_name: crucible-app
    restart: unless-stopped
    environment:
      # Server configuration
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT:-8080}
      RUST_LOG: ${RUST_LOG:-crucible_backend=debug,tower_http=debug,sqlx=warn}
      RUST_BACKTRACE: ${RUST_BACKTRACE:-1}

      # Database connection
      DATABASE_URL: postgres://${POSTGRES_USER:-crucible}:${POSTGRES_PASSWORD:-crucible_secret}@postgres:5432/${POSTGRES_DB:-crucible_db}
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-10}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS:-2}
      DATABASE_CONNECT_TIMEOUT: ${DATABASE_CONNECT_TIMEOUT:-30}
      DATABASE_IDLE_TIMEOUT: ${DATABASE_IDLE_TIMEOUT:-600}

      # Redis connection
      REDIS_URL: redis://:${REDIS_PASSWORD:-crucible_redis_secret}@redis:6379/${REDIS_DB:-0}
      REDIS_POOL_SIZE: ${REDIS_POOL_SIZE:-5}

      # Application settings
      APP_ENV: ${APP_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 128M
          cpus: "0.5"
    networks:
      - crucible-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # pgAdmin 4 — Database Administration (development profile only)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crucible-pgadmin
    restart: unless-stopped
    profiles:
      - dev-tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@crucible.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "${PGADMIN_PORT:-5050}:5050"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - crucible-network

  # ---------------------------------------------------------------------------
  # Redis Commander — Redis Administration (development profile only)
  # ---------------------------------------------------------------------------
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: crucible-redis-commander
    restart: unless-stopped
    profiles:
      - dev-tools
    environment:
      REDIS_HOSTS: "local:redis:6379:${REDIS_DB:-0}:${REDIS_PASSWORD:-crucible_redis_secret}"
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - crucible-network

# =============================================================================
# Volumes — Persistent data storage
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: crucible-postgres-data
  redis_data:
    driver: local
    name: crucible-redis-data
  pgadmin_data:
    driver: local
    name: crucible-pgadmin-data

# =============================================================================
# Networks — Isolated service communication
# =============================================================================
networks:
  crucible-network:
    driver: bridge
    name: crucible-network
    ipam:
      config:
        - subnet: 172.28.0.0/16
